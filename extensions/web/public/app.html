<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
	<title>Perch — session</title>

	<!-- PWA -->
	<link rel="manifest" href="/mobile/manifest.json">
	<meta name="theme-color" content="#0e6b62">
	<meta name="mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
	<meta name="apple-mobile-web-app-title" content="Perch">

	<style>
		/* ── Perch design system (shared with the hub) ─────────── */
		:root {
			--sky: #eef1f3; --card: #ffffff; --elevated: #f4f7f8; --hover: #e5ebee;
			--line: #dde4e8; --ink: #22303a; --dim: #6b7c88; --faint: #94a4ae;
			--teal: #0e6b62; --teal-hi: #128a7e; --teal-soft: #dcecea;
			--alive: #2fa36b; --attn: #d1633e; --error: #c2453a; --wire: #94a4ae;
			--r: 14px; --r-sm: 10px; --r-xs: 6px;
			--tab-h: 58px;
			--safe-b: env(safe-area-inset-bottom, 0px); --safe-t: env(safe-area-inset-top, 0px);
			--mono: "JetBrains Mono", "Cascadia Mono", ui-monospace, monospace;
			--sans: "Inter", "Public Sans", system-ui, -apple-system, sans-serif;
		}
		@media (prefers-color-scheme: dark) {
			:root {
				--sky: #131a1f; --card: #1b242b; --elevated: #212c34; --hover: #29363f;
				--line: #2a353d; --ink: #e4ebef; --dim: #8fa0ab; --faint: #5d6e79;
				--teal: #4fbdb0; --teal-hi: #6fd0c4; --teal-soft: #16322f; --wire: #46565f;
			}
		}
		*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
		html, body { height: 100%; font-family: var(--sans); background: var(--sky); color: var(--ink); -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
		body { display: flex; flex-direction: column; }
		#app { display: flex; flex-direction: column; height: 100%; width: 100%; max-width: 560px; margin: 0 auto; }
		button { font-family: var(--sans); }
		:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }

		/* ── Header: the wire runs across the top; the bird is the status ── */
		.hdr { position: relative; background: var(--card); border-bottom: 1px solid var(--line); padding: 10px 14px 8px; padding-top: calc(10px + var(--safe-t)); flex-shrink: 0; }
		.hdr::after { content: ""; position: absolute; left: 0; right: 0; bottom: -2px; border-top: 2px solid var(--wire); }
		.hdr-row { display: flex; align-items: center; gap: 10px; }
		.hub-link { color: var(--dim); display: flex; align-items: center; text-decoration: none; padding: 4px; }
		.hdr-title { font-size: 16px; font-weight: 650; letter-spacing: -0.01em; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.bird { width: 24px; height: 17px; color: var(--faint); flex-shrink: 0; transition: color 0.3s; }
		.bird svg { width: 100%; height: 100%; display: block; }
		.bird.working { color: var(--alive); }
		.bird.attn { color: var(--attn); }
		/* chips row */
		.chips { display: flex; gap: 8px; margin-top: 8px; overflow-x: auto; scrollbar-width: none; align-items: center; }
		.chips::-webkit-scrollbar { display: none; }
		/* mode = segmented control: the filled half is where you ARE */
		.seg { display: inline-flex; border: 1px solid var(--line); border-radius: 999px; overflow: hidden; flex-shrink: 0; }
		.seg button { border: 0; background: var(--elevated); color: var(--dim); padding: 5px 13px; font: 600 12px var(--sans); cursor: pointer; }
		.seg button.on { background: var(--teal); color: #fff; }
		.seg button.exec { background: var(--attn); color: #fff; }
		.chip { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); background: var(--elevated); color: var(--dim); border-radius: 999px; padding: 5px 11px; font: 500 12px var(--sans); white-space: nowrap; cursor: pointer; flex-shrink: 0; }
		.chip.mono { font-family: var(--mono); font-size: 11.5px; }
		.chip:active, .seg button:active { opacity: 0.75; }
		.chip svg { width: 11px; height: 11px; }

		/* plan execution progress */
		.progress { height: 3px; background: var(--line); border-radius: 2px; overflow: hidden; margin-top: 8px; display: none; }
		.progress.show { display: block; }
		.progress > div { height: 100%; background: var(--teal); width: 0%; transition: width 0.4s; }

		/* attention banner */
		.banner { display: none; background: color-mix(in srgb, var(--attn) 12%, var(--card)); border: 1px solid var(--attn); color: var(--attn); border-radius: var(--r-sm); margin: 8px 12px 0; padding: 9px 12px; font-size: 13px; font-weight: 500; }
		.banner.show { display: block; }

		/* ── Content area ── */
		.content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
		.pane { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

		/* ── Chat ── */
		.chat { display: flex; flex-direction: column; height: 100%; }
		.msgs { flex: 1; overflow-y: auto; padding: 14px 14px 6px; display: flex; flex-direction: column; gap: 10px; }
		.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 10px; color: var(--faint); }
		.empty .bird { width: 40px; height: 28px; color: var(--wire); }
		.empty .t { font-size: 14px; color: var(--dim); }
		.m { max-width: 86%; padding: 10px 13px; border-radius: var(--r); font-size: 14.5px; line-height: 1.5; word-wrap: break-word; }
		.m-user { align-self: flex-end; background: var(--teal); color: #fff; border-bottom-right-radius: var(--r-xs); }
		.m-agent { align-self: flex-start; background: var(--card); border: 1px solid var(--line); border-bottom-left-radius: var(--r-xs); }
		.m-agent pre { background: var(--sky); padding: 8px 10px; border-radius: var(--r-xs); overflow-x: auto; font: 12.5px var(--mono); margin: 6px 0; }
		.m-agent { position: relative; }
		.prewrap { position: relative; }
		.copy-pre { position: absolute; top: 10px; right: 6px; z-index: 1; background: var(--card); border: 1px solid var(--line); border-radius: var(--r-xs); color: inherit; padding: 1px 7px; font-size: 12px; opacity: .65; cursor: pointer; }
		.copy-msg { float: right; margin: 0 0 4px 8px; background: none; border: none; color: inherit; opacity: .45; font-size: 13px; cursor: pointer; padding: 2px 4px; }
		.copy-pre:active, .copy-msg:active { opacity: 1; }
		.copied { opacity: 1 !important; color: var(--teal, #2a9d8f) !important; }
		.m-agent code { font: 12.5px var(--mono); color: var(--teal); }
		.m-agent p { margin: 0 0 8px; } .m-agent p:last-child { margin: 0; }
		.m-agent ul, .m-agent ol { margin: 4px 0; padding-left: 20px; }
		.m-agent a { color: var(--teal-hi); }
		.m-sys { align-self: center; color: var(--faint); font-size: 12px; padding: 2px 8px; text-align: center; }
		.toolwrap { align-self: flex-start; max-width: 90%; }
		.m-tool { display: inline-flex; align-items: center; gap: 7px; background: var(--elevated); border: 1px solid var(--line); border-radius: 999px; padding: 5px 12px; font: 12px var(--mono); color: var(--dim); max-width: 100%; overflow: hidden; cursor: pointer; text-align: left; }
		.tool-details { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-sm); margin-top: 5px; padding: 8px 10px; font-size: 12px; }
		.tool-details .td-h { font: 600 10px var(--mono); text-transform: uppercase; letter-spacing: .07em; color: var(--faint); margin: 6px 0 3px; }
		.tool-details .td-h:first-child { margin-top: 0; }
		.tool-details pre { background: var(--sky); padding: 7px 9px; border-radius: var(--r-xs); overflow-x: auto; font: 11px var(--mono); line-height: 1.5; max-height: 240px; overflow-y: auto; white-space: pre-wrap; word-break: break-word; margin: 0; }
		.m-tool .tn { color: var(--teal); font-weight: 600; }
		.m-tool.err { border-color: var(--error); } .m-tool.err .tn { color: var(--error); }
		.m-tool .spin { width: 10px; height: 10px; border: 2px solid var(--line); border-top-color: var(--teal); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
		@keyframes spin { to { transform: rotate(360deg); } }
		@media (prefers-reduced-motion: reduce) { .m-tool .spin { animation-duration: 2s; } }
		.typing { align-self: flex-start; color: var(--faint); font-size: 12.5px; padding: 0 6px; display: none; }
		.typing.show { display: block; }

		/* ask_user question cards */
		.ask { width: 86%; }
		.ask-q { margin-bottom: 12px; }
		.ask-h { display: inline-block; font: 600 10.5px var(--mono); color: var(--teal); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
		.ask-t { font-weight: 600; margin-bottom: 8px; }
		.ask-multi { color: var(--dim); font-weight: 400; font-size: 12px; }
		.ask-opts { display: grid; gap: 6px; }
		.ask-opt { text-align: left; background: var(--elevated); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 9px 12px; color: var(--ink); cursor: pointer; font: 13.5px var(--sans); }
		.ask-opt b { display: block; font-weight: 600; }
		.ask-opt span { color: var(--dim); font-size: 12px; }
		.ask-opt.sel { border-color: var(--teal); background: var(--teal-soft); color: var(--teal); }
		.ask-opt.sel span { color: var(--teal); opacity: .8; }
		.ask-opt:disabled { opacity: .55; cursor: default; }
		.ask-other { width: 100%; margin-top: 6px; border: 1px solid var(--line); background: var(--sky); color: var(--ink); border-radius: var(--r-sm); padding: 8px 11px; font: 13.5px var(--sans); }
		.ask-other::placeholder { color: var(--faint); }
		.ask-send { width: 100%; margin-top: 4px; border: 0; border-radius: var(--r-sm); background: var(--teal); color: #fff; padding: 10px; font: 600 13.5px var(--sans); cursor: pointer; }
		.ask-send:disabled { opacity: .45; }
		.ask-done { color: var(--alive); font-size: 12.5px; font-weight: 600; }

		/* composer */
		.attach-chips { display: flex; gap: 6px; flex-wrap: wrap; padding: 8px 12px 0; background: var(--card); }
		.attach-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--teal-soft); color: var(--teal); border-radius: 10px; padding: 4px 10px 4px 4px; font: 500 12px var(--mono); }
		.attach-chip img { width: 34px; height: 34px; object-fit: cover; border-radius: 7px; display: block; }
		.attach-chip.nofile { padding-left: 10px; }
		.attach-chip button { background: none; border: 0; color: var(--teal); font-size: 14px; cursor: pointer; line-height: 1; padding: 0 2px; }
		.m-user .thumbs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 6px; }
		.m-user .thumbs img { max-width: 160px; max-height: 160px; border-radius: 9px; display: block; }
		/* agent-sent files */
		.m-file .sent-img { max-width: 100%; max-height: 260px; border-radius: 9px; display: block; margin-bottom: 8px; }
		.m-file .file-row { display: flex; align-items: baseline; gap: 10px; font-size: 13px; }
		.m-file .fname { font-family: var(--mono); font-size: 12.5px; overflow: hidden; text-overflow: ellipsis; }
		.m-file .fsize { color: var(--faint); font-size: 11.5px; flex-shrink: 0; }
		.m-file .dl { color: var(--teal); font-weight: 600; text-decoration: none; flex-shrink: 0; margin-left: auto; }
		.m-file .fcap { color: var(--dim); font-size: 12.5px; margin-top: 5px; }
		.composer { display: flex; gap: 8px; padding: 10px 12px calc(10px + var(--safe-b)); background: var(--card); border-top: 1px solid var(--line); flex-shrink: 0; align-items: flex-end; }
		.clip { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--line); background: var(--elevated); color: var(--dim); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
		.clip.busy { opacity: 0.5; pointer-events: none; }
		.composer textarea { flex: 1; resize: none; border: 1px solid var(--line); background: var(--sky); color: var(--ink); border-radius: var(--r); padding: 11px 14px; font: 15px var(--sans); max-height: 120px; }
		.composer textarea::placeholder { color: var(--faint); }
		.send { width: 42px; height: 42px; border-radius: 50%; border: 0; background: var(--teal); color: #fff; font-size: 17px; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
		.send:disabled { opacity: 0.45; }

		/* command menu */
		.cmdmenu { position: absolute; bottom: 100%; left: 12px; right: 12px; margin-bottom: 6px; background: var(--card); border: 1px solid var(--line); border-radius: var(--r-sm); box-shadow: 0 6px 24px rgb(0 0 0 / 18%); max-height: 40vh; overflow-y: auto; display: none; }
		.cmdmenu.show { display: block; }
		.cmdmenu button { display: block; width: 100%; text-align: left; background: none; border: 0; border-bottom: 1px solid var(--line); padding: 10px 14px; color: var(--ink); font-size: 13.5px; cursor: pointer; }
		.cmdmenu button:last-child { border-bottom: 0; }
		.cmdmenu button b { font-family: var(--mono); color: var(--teal); font-weight: 600; }
		.cmdmenu button span { color: var(--faint); font-size: 12px; display: block; margin-top: 1px; }

		/* ── Session tab ── */
		.cards { padding: 14px; display: grid; gap: 12px; }
		.card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r); padding: 14px 16px; }
		.card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dim); font-weight: 600; margin-bottom: 10px; }
		.kv { display: flex; justify-content: space-between; gap: 12px; padding: 6px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; }
		.kv:last-child { border-bottom: 0; }
		.kv .k { color: var(--dim); flex-shrink: 0; }
		.kv .v { font-family: var(--mono); font-size: 12.5px; text-align: right; overflow: hidden; text-overflow: ellipsis; }
		.actions { display: flex; flex-wrap: wrap; gap: 8px; }
		.abtn { border: 1px solid var(--line); background: var(--elevated); color: var(--ink); border-radius: var(--r-sm); padding: 10px 14px; font: 500 13.5px var(--sans); cursor: pointer; }
		.abtn.primary { background: var(--teal); border-color: var(--teal); color: #fff; }
		.todo { display: flex; gap: 8px; align-items: baseline; padding: 5px 0; font-size: 13.5px; }
		.todo.done { color: var(--faint); text-decoration: line-through; }
		.todo .box { font-family: var(--mono); color: var(--teal); }

		/* ── Files ── */
		.crumbs { padding: 12px 14px 0; font: 12px var(--mono); color: var(--dim); display: flex; flex-wrap: wrap; gap: 4px; }
		.crumbs a { color: var(--teal); text-decoration: none; cursor: pointer; }
		.flist { padding: 8px 14px 14px; display: grid; gap: 6px; }
		.frow { display: flex; align-items: center; gap: 10px; background: var(--card); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 10px 13px; cursor: pointer; font-size: 13.5px; }
		.frow svg { flex-shrink: 0; color: var(--dim); }
		.frow .fn { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
		.frow .fs { color: var(--faint); font: 11px var(--mono); }
		.fview { padding: 14px; }
		.fview pre { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 12px; overflow-x: auto; font: 12px var(--mono); line-height: 1.55; }

		/* ── Activity ── */
		.acts { padding: 14px; display: grid; gap: 8px; }
		.act { display: flex; gap: 10px; background: var(--card); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 9px 12px; font-size: 12.5px; align-items: baseline; }
		.act .tm { font: 10.5px var(--mono); color: var(--faint); flex-shrink: 0; }
		.act .src { font: 600 11px var(--mono); color: var(--teal); flex-shrink: 0; }
		.act.err .src { color: var(--error); }
		.act .txt { color: var(--dim); overflow: hidden; text-overflow: ellipsis; }

		/* ── Tab bar ── */
		.tabs { display: flex; background: var(--card); border-top: 1px solid var(--line); height: var(--tab-h); padding-bottom: var(--safe-b); flex-shrink: 0; }
		.tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; background: none; border: 0; color: var(--faint); font: 500 10.5px var(--sans); cursor: pointer; }
		.tab svg { width: 21px; height: 21px; }
		.tab.on { color: var(--teal); }

		/* ── Bottom sheet ── */
		.sheet-bg { position: fixed; inset: 0; background: rgb(0 0 0 / 45%); display: none; z-index: 40; }
		.sheet-bg.show { display: block; }
		.sheet { position: fixed; left: 0; right: 0; bottom: 0; max-width: 560px; margin: 0 auto; background: var(--card); border-radius: var(--r) var(--r) 0 0; border: 1px solid var(--line); border-bottom: 0; padding: 10px 14px calc(16px + var(--safe-b)); z-index: 41; transform: translateY(105%); transition: transform 0.22s ease; max-height: 70vh; overflow-y: auto; }
		.sheet.show { transform: translateY(0); }
		.sheet h3 { font-size: 14px; margin: 8px 2px 12px; }
		.sheet .grab { width: 36px; height: 4px; border-radius: 2px; background: var(--line); margin: 0 auto; }
		.sheet button.opt { display: block; width: 100%; text-align: left; background: var(--elevated); border: 1px solid var(--line); border-radius: var(--r-sm); padding: 12px 14px; margin-bottom: 8px; color: var(--ink); font: 13px var(--mono); cursor: pointer; }
		.sheet button.opt.hot { border-color: var(--teal); color: var(--teal); font-weight: 600; }
		.sheet .note { color: var(--faint); font-size: 12px; margin: 4px 2px 10px; }
		/* plan step-progress sheet */
		.step { display: flex; gap: 9px; padding: 7px 4px; font-size: 13.5px; border-bottom: 1px solid var(--line); align-items: baseline; }
		.step:last-of-type { border-bottom: 0; }
		.step .sbox { font-family: var(--mono); flex-shrink: 0; color: var(--dim); }
		.step.done { color: var(--faint); }
		.step.done .stxt { text-decoration: line-through; }
		.step.done .sbox { color: var(--alive); }
		.step.cur { color: var(--teal); font-weight: 600; }
		.step.cur .sbox { color: var(--teal); }
	</style>
</head>
<body>
	<div id="app"></div>

	<script type="module">
		import { h, render } from "https://esm.sh/preact@10.25.4";
		import { useState, useCallback, useEffect, useRef } from "https://esm.sh/preact@10.25.4/hooks";
		import htm from "https://esm.sh/htm@3.1.1";
		const html = htm.bind(h);

		// Works at /mobile and behind the hub proxy at /s/<id>/mobile.
		const APP_BASE = location.pathname.replace(/\/mobile(\/.*)?$/, "");
		// Client build marker — sent on history/events requests so the server
		// access log shows which shell version a phone is actually running.
		const CLIENT_BUILD = "w1";
		const api = (p, opts) => fetch(APP_BASE + "/api/mobile" + p + (p.includes("?") ? "&" : "?") + "b=" + CLIENT_BUILD, opts).then(r => r.json()).catch(() => ({ error: "network" }));
		const post = (p, body) => api(p, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
		const sendPrompt = (prompt) => post("/chat/prompt", { prompt });

		// ── Icons (inline SVG, stroke style) ──
		const BIRD = html`<svg viewBox="0 0 32 22" fill="currentColor" aria-hidden="true">
			<path d="M2 9c3-4 7-5 10-4 1.2-2.4 3.4-3.6 5.8-3.2 1.7.3 3 1.4 3.7 2.9l4.2 1.5c.4.15.4.6.05.8l-3.6 1.6c.2 2.6-.9 5.2-3.2 6.8-1.8 1.2-3.9 1.6-5.9 1.2l-1.5 3h-1.7l1.2-3.6c-1.9-.8-3.4-2.3-4.1-4.3C5.4 11 3.6 10 2 9z"/>
			<circle cx="19.6" cy="5.6" r=".9" fill="var(--card)"/>
			<path d="M12.5 18.5h1.4l-.3 3h-1zM16.5 18.7h1.4l-.3 2.8h-1z"/>
		</svg>`;
		const I = {
			chat: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M21 12a8 8 0 0 1-8 8H4l2-3a8 8 0 1 1 15-5z"/></svg>`,
			session: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M2 9h20"/><circle cx="8" cy="9" r="2.4" fill="currentColor" stroke="none"/><path d="M4 20h16M8 11v4m0 0h8m-8 0-3 5m11-9v4m0 0 3 5"/></svg>`,
			files: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M13 2v7h7"/></svg>`,
			activity: html`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 8L9 4l-3 8H2"/></svg>`,
			back: html`<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>`,
			dir: html`<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`,
			file: html`<svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M13 2v7h7"/></svg>`,
		};

		const fmtSize = (b) => b > 1048576 ? (b / 1048576).toFixed(1) + "M" : b > 1024 ? Math.round(b / 1024) + "K" : b + "B";
		const tm = (iso) => (iso || new Date().toISOString()).slice(11, 19);
		// minimal safe markdown-ish rendering: escape first, then bold/code/pre.
		// Fence contents are stashed as placeholders BEFORE the inline/br passes —
		// otherwise those passes corrupt code (backticks/** inside code) and turn
		// newlines into <br>, which breaks pre rendering AND makes pre.textContent
		// (the copy source) collapse multiline code into one line.
		const esc = (s) => s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
		function md(s) {
			// One malformed message must never freeze the whole chat render.
			if (typeof s !== "string") s = String(s ?? "");
			let x = esc(s);
			const stash = [];
			x = x.replace(/```(\w*)\n([\s\S]*?)```/g, (_, l, c) => {
				stash.push(c);
				return `\x00PRE${stash.length - 1}\x00`;
			});
			x = x.replace(/`([^`\n]+)`/g, "<code>$1</code>");
			x = x.replace(/\*\*([^*\n]+)\*\*/g, "<b>$1</b>");
			x = x.replace(/\n/g, "<br>");
			x = x.replace(/\x00PRE(\d+)\x00/g, (_, i) =>
				`<div class="prewrap"><button class="copy-pre" aria-label="Copy code">⧉</button><pre>${stash[Number(i)]}</pre></div>`);
			return x;
		}

		// one-tap copy with ✓ flash; execCommand fallback for non-secure contexts
		function copyText(text, btn) {
			const flash = () => {
				if (!btn) return;
				const orig = btn.textContent;
				btn.textContent = "✓";
				btn.classList.add("copied");
				setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 1200);
			};
			if (navigator.clipboard?.writeText) {
				navigator.clipboard.writeText(text).then(flash).catch(() => {});
			} else {
				const ta = document.createElement("textarea");
				ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
				document.body.appendChild(ta); ta.select();
				try { document.execCommand("copy"); flash(); } catch {}
				document.body.removeChild(ta);
			}
		}
		// delegation for copy buttons living inside dangerouslySetInnerHTML
		function onMsgsClick(e) {
			const btn = e.target.closest?.(".copy-pre");
			if (!btn) return;
			const pre = btn.parentElement?.querySelector("pre");
			if (pre) copyText(pre.textContent, btn);
		}

		function App() {
			const [tab, setTab] = useState("chat");
			const [status, setStatus] = useState(null);
			const [msgs, setMsgs] = useState([]);
			const [busy, setBusy] = useState(false);
			const [attention, setAttention] = useState(null);
			const [plan, setPlan] = useState(null);
			const [sheet, setSheet] = useState(null); // null | "plan"
			const [models, setModels] = useState({ models: [], detailed: [], current: null });
			const [starting, setStarting] = useState(null); // provider/id being started
			const [execModels, setExecModels] = useState(null); // executor + agent bindings
			const [modelRole, setModelRole] = useState(null); // role being re-bound in the sheet
			const [permMode, setPermMode] = useState(null);
			const [acts, setActs] = useState([]);
			const msgsRef = useRef(null);

			const addMsg = useCallback((m) => setMsgs((p) => [...p.slice(-199), m]), []);
			const toggleTool = useCallback((id) => setMsgs((p) => p.map((m) => m.kind === "tool" && m.id === id ? { ...m, open: !m.open } : m)), []);
			const refreshStatus = useCallback(() => { api("/status").then((s) => { if (!s.error) { setStatus(s); setPlan(s.agent?.planMode ?? null); setPermMode(s.agent?.permMode ?? null); setAttention(s.agent?.attention ?? null); } }); }, []);

			const loadHistory = useCallback(async () => {
				const h = await api("/chat/history");
				if (h.error) return;
				const asks = Array.isArray(h.pendingAsk) ? h.pendingAsk.map((a) => ({ kind: "ask", id: a.id, questions: a.questions })) : [];
				// file cards arrive INLINE in h.messages (kind:"file"), at their
				// original conversation position
				if ((Array.isArray(h.messages) && h.messages.length) || asks.length) setMsgs([...(h.messages ?? []), ...asks]);
			}, []);

			// SSE
			useEffect(() => {
				refreshStatus();
				loadHistory();
				let es = null;
				let retry = null;
				let lastEventAt = Date.now();
				const connect = () => {
					if (retry) { clearTimeout(retry); retry = null; }
					if (es) { try { es.close(); } catch {} }
					lastEventAt = Date.now();
					es = new EventSource(APP_BASE + "/api/mobile/chat/events?b=" + CLIENT_BUILD);
					es.onmessage = (ev) => {
						lastEventAt = Date.now();
						let d; try { d = JSON.parse(ev.data); } catch { return; }
						if (d.type === "connected") { loadHistory(); refreshStatus(); } // reconnect → resync anything missed
						if (d.type === "agent_start") { setBusy(true); setAttention(null); }
						if (d.type === "agent_end") { setBusy(false); refreshStatus(); }
						if (d.type === "turn_end" && d.content) {
							// content is an ARRAY of {type:"text"|"thinking"} blocks —
							// passing it straight to md() threw on .replace and froze
							// the whole chat render until a manual page reload. Live
							// replies NEVER rendered before this fix.
							const txt = (Array.isArray(d.content) ? d.content : [])
								.filter((b) => b && b.type === "text" && typeof b.text === "string")
								.map((b) => b.text).join("\n").trim();
							if (txt) addMsg({ kind: "agent", text: txt, t: d.time });
						}
						if (d.type === "tool_start") addMsg({ kind: "tool", tool: d.toolName, id: d.toolCallId, running: true, args: d.args ?? "" });
						if (d.type === "tool_end") {
							const rtxt = (Array.isArray(d.content) ? d.content : []).filter((b) => b?.type === "text").map((b) => b.text).join("\n").slice(0, 2000);
							setMsgs((p) => p.map((m) => m.id === d.toolCallId ? { ...m, running: false, err: d.isError, result: rtxt } : m));
						}
						if (d.type === "command_result" && d.message) addMsg({ kind: "sys", text: d.message });
						if (d.type === "plan_state") { setPlan(d); }
						if (d.type === "perm_mode") { setPermMode(d.mode); }
						if (d.type === "attention") { setAttention(d); }
						if (d.type === "attention_clear") { setAttention(null); }
						if (d.type === "user_file") addMsg({ kind: "file", id: d.id, name: d.name, mime: d.mime, size: d.size, caption: d.caption });
						if (d.type === "ask_user") setMsgs((p) => p.some((m) => m.kind === "ask" && m.id === d.id) ? p : [...p.slice(-199), { kind: "ask", id: d.id, questions: d.questions }]);
						if (d.type === "ask_user_resolved") setMsgs((p) => p.map((m) => m.kind === "ask" && m.id === d.id ? { ...m, done: true } : m));
						if (d.type === "model_starting") { setStarting(d.model); if (d.stage?.startsWith("stopping")) addMsg({ kind: "sys", text: `freeing RAM: ${d.stage.split(":")[1]} shutting down` }); }
						if (d.type === "model_switched") { setStarting(null); refreshStatus(); addMsg({ kind: "sys", text: `now on ${d.model}` }); }
						if (d.type === "model_error") { setStarting(null); addMsg({ kind: "sys", text: `model start failed: ${d.error}` }); }
						if (d.type === "tool_start" || d.type === "tool_end") {
							setActs((p) => [{ tm: tm(d.time), src: d.toolName, txt: d.type === "tool_end" ? (d.isError ? "error" : "done") : "start", err: d.isError }, ...p.slice(0, 149)]);
						}
					};
					es.onerror = () => { es.close(); retry = setTimeout(connect, 3000); };
				};
				connect();
				// Phones freeze JS and silently kill sockets when the screen locks
				// or the tab backgrounds; on return the old EventSource can be a
				// zombie that never fires onerror. Two independent recovery paths:
				//   1. wake signals (visibilitychange/pageshow/focus/online) —
				//      resync immediately AND reconnect the stream
				//   2. stale-ping watchdog — the server sends a ping data-event
				//      every 15s; if none seen for 40s while visible, reconnect
				//      (catches zombies even when no wake event ever fires)
				const revive = () => {
					if (document.visibilityState !== "visible") return;
					loadHistory();
					refreshStatus();
					connect();
				};
				const watchdog = setInterval(() => {
					if (document.visibilityState === "visible" && Date.now() - lastEventAt > 40000) revive();
				}, 5000);
				document.addEventListener("visibilitychange", revive);
				window.addEventListener("pageshow", revive);
				window.addEventListener("focus", revive);
				window.addEventListener("online", revive);
				return () => {
					document.removeEventListener("visibilitychange", revive);
					window.removeEventListener("pageshow", revive);
					window.removeEventListener("focus", revive);
					window.removeEventListener("online", revive);
					clearInterval(watchdog);
					if (retry) clearTimeout(retry);
					if (es) es.close();
				};
			}, []);

			useEffect(() => { if (msgsRef.current) msgsRef.current.scrollTop = msgsRef.current.scrollHeight; }, [msgs, busy]);

			// sheet: null | "plan" (pick planning model, enters plan mode)
			//             | "model" (pick active model, direct switch)
			//             | "agent-model" (re-bind executor/agent default)
			const openSheet = async (kind) => {
				const m = await api("/models");
				if (!m.error) setModels(m);
				setSheet(kind);
			};
			const loadExecModels = useCallback(() => api("/agent-models").then((r) => { if (!r.error) setExecModels(r); }), []);
			const pickRole = (role) => { setModelRole(role); openSheet("agent-model"); };
			// Set a binding. Local models share ONE server slot — picking a local
			// model while other roles are bound to a DIFFERENT local one offers an
			// atomic swap (move them all) instead of silently creating a config
			// that thrashes the llama.cpp server on every leg.
			const setRoleModel = async (ref) => {
				setSheet(null);
				const known = [...(models.detailed ?? []), ...(execModels?.bound ?? [])];
				const isLocal = (r) => known.some((x) => x.ref === r && x.local);
				let updates = [{ role: modelRole, model: ref }];
				if (ref && isLocal(ref)) {
					const bindings = [["executor", execModels?.executor?.model], ...(execModels?.agents ?? []).map((a) => [a.name, a.model])];
					const conflicted = bindings.filter(([role, m]) => role !== modelRole && m && m !== ref && isLocal(m));
					if (conflicted.length) {
						const names = conflicted.map(([r]) => r).join(", ");
						if (!confirm(`Local models share one server slot — ${ref.split("/").pop()} evicts ${conflicted[0][1].split("/").pop()}, breaking roles still bound to it.\n\nMove ${names} to ${ref.split("/").pop()} too? (Cancel changes nothing.)`)) return;
						updates = updates.concat(conflicted.map(([role]) => ({ role, model: ref })));
					}
				}
				for (const u of updates) {
					const r = await post("/agent-models", u);
					if (r?.error) { alert(`${u.role}: ${r.error}`); break; }
				}
				loadExecModels();
				addMsg({ kind: "sys", text: `${updates.map((u) => u.role).join(", ")} → ${ref ? ref.split("/").pop() : "default"}` });
			};
			const toNormal = () => {
				if (!plan?.enabled) return;
				if (confirm("Exit plan mode? Tools and the pre-plan model are restored.")) sendPrompt("/plan off");
			};
			const enablePlan = (model) => { setSheet(null); sendPrompt("/plan " + model); };
			const switchModel = async (model) => {
				setSheet(null);
				const r = await post("/model", { model });
				if (r.error) alert(r.error);
				else if (r.starting) setStarting(model);
				refreshStatus();
			};

			const send = (text, images) => {
				if (!text.trim() && !(images?.length)) return;
				addMsg({
					kind: "user",
					text: text.trim(),
					imgs: (images ?? []).map((i) => `data:${i.mimeType};base64,${i.dataBase64}`),
					t: new Date().toISOString(),
				});
				post("/chat/prompt", { prompt: text.trim() || "Please look at the attached image(s).", images: images ?? [] })
					.then((r) => { if (r?.error) addMsg({ kind: "sys", text: r.error }); });
			};

			const agent = status?.agent ?? {};
			const asking = msgs.some((m) => m.kind === "ask" && !m.done);
			const birdCls = attention || asking ? "attn" : busy ? "working" : "";
			const stateTxt = attention || asking ? "needs input" : busy ? "working" : (agent.idle === false ? "working" : "idle");

			return html`
				<header class="hdr">
					<div class="hdr-row">
						<a class="hub-link" href="/" aria-label="Back to hub">${I.back}</a>
						<span class="bird ${birdCls}">${BIRD}</span>
						<div class="hdr-title">${agent.sessionName || (agent.cwd ? agent.cwd.split("/").pop() : "pi session")}</div>
						<span style="font-size:12px;color:${attention ? "var(--attn)" : busy ? "var(--alive)" : "var(--faint)"};font-weight:600">${stateTxt}</span>
					</div>
					<div class="chips">
						<div class="seg" role="group" aria-label="Mode">
							<button class=${!plan?.enabled ? (plan?.executing ? "exec" : "on") : ""}
								onClick=${() => plan?.enabled ? toNormal() : openSheet("perm")}>
								${plan?.executing ? "Executing" : ({ "ask": "Ask", "accept-edits": "Edits ✓", "auto": "Auto", "bypass": "Bypass" }[permMode] ?? "Normal")}
							</button>
							<button class=${plan?.enabled ? "on" : ""} onClick=${() => !plan?.enabled && openSheet("plan")}>Plan</button>
						</div>
						<button class="chip mono" onClick=${() => openSheet("model")} aria-label="Switch model">
							${starting ? `loading ${starting.split("/").pop()}…` : (agent.model ?? "model?").split("/").pop() + (agent.modelVision ? " 👁" : "")}
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
						</button>
						${plan?.executing && html`<button class="chip mono" onClick=${() => setSheet("steps")} aria-label="Show plan steps">${plan.todosDone}/${plan.todosTotal} steps</button>`}
					</div>
					<div class="progress ${plan?.executing && plan.todosTotal > 0 ? "show" : ""}"><div style="width:${plan?.todosTotal ? Math.round(100 * plan.todosDone / plan.todosTotal) : 0}%"></div></div>
					<div class="banner ${attention ? "show" : ""}">⚠ Session is waiting on a prompt${attention?.detail ? `: ${attention.detail}` : ""} — answer the question card in the chat.</div>
				</header>

				<div class="content">
					${tab === "chat" && html`<${Chat} msgs=${msgs} busy=${busy} onSend=${send} msgsRef=${msgsRef} onToggleTool=${toggleTool} />`}
					${tab === "session" && html`<${Session} status=${status} plan=${plan} refresh=${refreshStatus} send=${send} openSheet=${openSheet} em=${execModels} pickRole=${pickRole} loadEm=${loadExecModels} />`}
					${tab === "files" && html`<${Files} />`}
					${tab === "activity" && html`<${Activity} acts=${acts} />`}
				</div>

				<nav class="tabs">
					${[["chat", "Chat", I.chat], ["session", "Session", I.session], ["files", "Files", I.files], ["activity", "Activity", I.activity]].map(([id, label, icon]) => html`
						<button class="tab ${tab === id ? "on" : ""}" onClick=${() => setTab(id)}>${icon}${label}</button>
					`)}
				</nav>

				<div class="sheet-bg ${sheet ? "show" : ""}" onClick=${() => setSheet(null)}></div>
				<div class="sheet ${sheet ? "show" : ""}">
					<div class="grab"></div>
					${sheet === "plan" && html`
						<h3>Enter plan mode — pick the planning model</h3>
						<div class="note">Read-only exploration on the model you choose; your current model is restored when you exit or execute.</div>
						${models.current && html`<button class="opt hot" onClick=${() => enablePlan(models.current)}>keep current — ${models.current}</button>`}
						${models.models.filter((m) => m !== models.current).map((m) => html`<button class="opt" onClick=${() => enablePlan(m)}>${m}</button>`)}
					`}
					${sheet === "perm" && html`
						<h3>Permission mode</h3>
						<div class="note">How much pi asks before acting. Prompts appear in the terminal — you'll get a banner + push here when one is waiting.</div>
						${[["ask", "Ask — prompt for edits, commands, and tools"], ["accept-edits", "Accept edits — file changes free; commands prompt"], ["auto", "Auto — local classifier judges commands; only risky ones prompt"], ["bypass", "Bypass — run everything (catastrophic guard stays on)"]].map(([m, label]) => html`
							<button class="opt ${permMode === m ? "hot" : ""}" onClick=${() => { setSheet(null); if (permMode !== m) sendPrompt("/mode " + m); }}>${permMode === m ? "current — " : ""}${label}</button>
						`)}
					`}
					${sheet === "classifier" && html`
						<h3>Permission classifier (auto mode)</h3>
						<div class="note">The model that judges commands in <b>auto</b> mode. ${status?.agent?.classifier?.dedicated ? html`A dedicated endpoint (<b>${status.agent.classifier.dedicated}</b>) is tried first — this picker sets the <b>fallback</b> used when it's unreachable.` : "No dedicated endpoint configured — this model does all classification."} Unknown verdicts always fail closed to a prompt.</div>
						${[["current", "current session model"], ...models.models.map((m) => [m, m])].map(([val, label]) => html`
							<button class="opt ${status?.agent?.classifier?.fallback === val ? "hot" : ""}" onClick=${async () => {
								setSheet(null);
								const r = await post("/classifier", { model: val });
								addMsg({ kind: "sys", text: r?.ok ? `classifier fallback → ${val}` : `classifier not saved: ${r?.error ?? "error"}` });
								refreshStatus();
							}}>${status?.agent?.classifier?.fallback === val ? "current — " : ""}${label}</button>
						`)}
					`}
					${sheet === "steps" && html`
						<h3>Plan progress — ${plan?.todosDone ?? 0}/${plan?.todosTotal ?? 0} steps</h3>
						${(plan?.todos ?? []).map((t, i) => {
							const curIdx = (plan.todos ?? []).findIndex((x) => !x.completed);
							const cur = !t.completed && i === curIdx;
							return html`<div class="step ${t.completed ? "done" : cur ? "cur" : ""}">
								<span class="sbox">${t.completed ? "☑" : cur ? "▶" : "☐"}</span><span class="stxt">${t.step}. ${t.text}</span>
							</div>`;
						})}
						${!(plan?.todos?.length) && html`<div class="note">No step list available — the plan predates step tracking, or tracking didn't engage for this run.</div>`}
					`}
					${sheet === "agent-model" && modelRole && html`
						<h3>${modelRole === "executor" ? "Executor model (applied when a plan Executes)" : `Model for ${modelRole} legs`}</h3>
						<div class="note">Persists as the default; legs pick it up on their next spawn. ● running local · ○ stopped local — local models share <b>one</b> server slot, so a different local pick offers to move all local-bound roles together.</div>
						<button class="opt" onClick=${() => setRoleModel(null)}>${modelRole === "executor" ? "Clear — restore pre-plan model at Execute" : "Clear override — use agent-file default"}</button>
						${(models.detailed?.length ? models.detailed : models.models.map((m) => ({ ref: m, local: false }))).map((d) => html`
							<button class="opt" onClick=${() => setRoleModel(d.ref)}>${d.local ? (d.running ? "● " : "○ ") : ""}${d.ref}</button>`)}
					`}
					${sheet === "model" && html`
						<h3>Switch model</h3>
						<div class="note">Changes the session's active model${plan?.enabled ? " (you're in plan mode — this changes the planning model)" : ""}. Picking a stopped local model <b>starts its server</b> and stops whichever local model was running — only one runs at a time. Big ones take a few minutes to load. 👁 = can see images.</div>
						${(models.detailed?.length ? models.detailed : models.models.map((m) => ({ ref: m, local: false }))).map((d) => html`
							<button class="opt ${d.ref === models.current ? "hot" : ""}" onClick=${() => d.ref !== models.current && switchModel(d.ref)}>
								${d.ref === models.current ? "current — " : d.local ? (d.running ? "● " : "○ ") : ""}${d.ref}${d.vision ? " 👁" : ""}${d.local && !d.running && d.ref !== models.current ? " — will start server" : ""}
							</button>`)}
					`}
				</div>
			`;
		}

		// Interactive question card for the ask_user tool (Claude Code
		// AskUserQuestion parity): tap options (radio / multi-select), optional
		// "Other" free text, one submit for the whole card. The session's turn
		// is blocked until this (or the terminal selector) answers.
		function AskCard({ m }) {
			const qs = Array.isArray(m.questions) ? m.questions : [];
			const [sel, setSel] = useState(() => qs.map(() => []));
			const [other, setOther] = useState(() => qs.map(() => ""));
			const [sending, setSending] = useState(false);
			const [localDone, setLocalDone] = useState(false);
			const done = m.done || localDone;
			const toggle = (qi, label, multi) => {
				if (done) return;
				setSel((p) => p.map((arr, i) => {
					if (i !== qi) return arr;
					if (!multi) return arr.includes(label) ? [] : [label];
					return arr.includes(label) ? arr.filter((l) => l !== label) : [...arr, label];
				}));
			};
			const ready = qs.every((_, i) => sel[i].length > 0 || other[i].trim());
			const submit = async () => {
				if (!ready || sending || done) return;
				setSending(true);
				const answers = qs.map((q, i) => ({
					question: q.question,
					answer: [...sel[i], ...(other[i].trim() ? [other[i].trim()] : [])].join(", "),
				}));
				const r = await post("/chat/answer", { id: m.id, answers });
				setSending(false);
				if (r?.error) alert(r.error);
				else setLocalDone(true);
			};
			return html`<div class="m m-agent ask">
				${qs.map((q, qi) => html`<div class="ask-q">
					${q.header ? html`<span class="ask-h">${q.header}</span>` : null}
					<div class="ask-t">${q.question}${q.multiSelect ? html` <span class="ask-multi">(select all that apply)</span>` : null}</div>
					<div class="ask-opts">
						${(q.options ?? []).map((o) => html`<button class="ask-opt ${sel[qi].includes(o.label) ? "sel" : ""}" disabled=${done} onClick=${() => toggle(qi, o.label, q.multiSelect)}>
							<b>${o.label}</b>${o.description ? html`<span>${o.description}</span>` : null}
						</button>`)}
					</div>
					<input class="ask-other" disabled=${done} placeholder="Other — type your own answer" value=${other[qi]}
						onInput=${(e) => setOther((p) => p.map((v, i) => i === qi ? e.target.value : v))} />
				</div>`)}
				${done
					? html`<div class="ask-done">✓ answered</div>`
					: html`<button class="ask-send" disabled=${!ready || sending} onClick=${submit}>${sending ? "sending…" : qs.length > 1 ? "Send answers" : "Send answer"}</button>`}
			</div>`;
		}

		function Chat({ msgs, busy, onSend, msgsRef, onToggleTool }) {
			const [text, setText] = useState("");
			const [cmds, setCmds] = useState(null);
			const [attached, setAttached] = useState([]);
			const [uploading, setUploading] = useState(false);
			const taRef = useRef(null);
			const fileRef = useRef(null);

			const allCmds = useRef(null);
			const maybeCmds = async (v) => {
				setText(v);
				// Live command preview: menu opens on "/" and filters as you type.
				if (v.startsWith("/") && !v.includes(" ")) {
					if (!allCmds.current) {
						const r = await api("/chat/commands");
						allCmds.current = r.commands ?? [];
					}
					const q = v.slice(1).toLowerCase();
					setCmds(allCmds.current.filter((c) => c.name.toLowerCase().includes(q)).slice(0, 30));
				} else setCmds(null);
			};

			const pickFiles = () => fileRef.current?.click();
			const upload = async (e) => {
				const files = [...(e.target.files ?? [])];
				e.target.value = "";
				setUploading(true);
				for (const f of files) {
					const b64 = await new Promise((resolve, reject) => {
						const r = new FileReader();
						r.onload = () => resolve(String(r.result).split(",", 2)[1] ?? "");
						r.onerror = reject;
						r.readAsDataURL(f);
					}).catch(() => null);
					if (b64 == null) continue;
					if (f.type.startsWith("image/")) {
						// Images attach to the message itself — the model SEES them.
						setAttached((p) => [...p, { kind: "image", name: f.name, dataBase64: b64, mimeType: f.type }]);
					} else {
						// Other files land on disk; the message references the path.
						const res = await post("/upload", { name: f.name, dataBase64: b64 });
						if (res.path) setAttached((p) => [...p, { kind: "file", name: f.name, path: res.path }]);
						else if (res.error) alert(res.error);
					}
				}
				setUploading(false);
			};

			const go = () => {
				const images = attached.filter((a) => a.kind === "image").map(({ dataBase64, mimeType }) => ({ dataBase64, mimeType }));
				const filePaths = attached.filter((a) => a.kind === "file").map((a) => a.path);
				let msg = text;
				if (filePaths.length) {
					const list = filePaths.map((p) => `- ${p}`).join("\n");
					msg = `I uploaded ${filePaths.length === 1 ? "a file" : "files"} for you to look at:\n${list}\n\n${text || "Please take a look."}`;
				}
				if (!msg.trim() && images.length === 0) return;
				onSend(msg, images);
				setText(""); setCmds(null); setAttached([]);
				if (taRef.current) taRef.current.style.height = "auto";
			};

			return html`
				<div class="chat">
					<div class="msgs" ref=${msgsRef} onClick=${onMsgsClick}>
						${msgs.length === 0 && html`<div class="empty"><span class="bird">${BIRD}</span><span class="t">Message your session — it lands as if typed in the terminal.</span></div>`}
						${msgs.map((m) => {
							if (m.kind === "user") return html`<div class="m m-user">
								${m.imgs?.length ? html`<div class="thumbs">${m.imgs.map((src) => html`<img src=${src} alt="attachment" />`)}</div>` : null}${m.text}
							</div>`;
							if (m.kind === "agent") return html`<div class="m m-agent">
								<button class="copy-msg" aria-label="Copy message" onClick=${(e) => copyText(m.text, e.currentTarget)}>⧉</button>
								<div dangerouslySetInnerHTML=${{ __html: md(m.text) }}></div>
							</div>`;
							if (m.kind === "file") {
								const src = APP_BASE + "/api/mobile/files/sent/" + m.id;
								const viewable = ["text/html", "image/svg+xml", "text/markdown", "text/plain", "application/json", "text/csv"].includes(m.mime);
								const rasterInline = m.mime?.startsWith("image/") && m.mime !== "image/svg+xml";
								return html`<div class="m m-agent m-file">
									${rasterInline ? html`<a href=${src + "?download=1"}><img class="sent-img" src=${src} alt=${m.name} /></a>` : null}
									<div class="file-row">
										<span class="fname">${m.name}</span>
										<span class="fsize">${m.size > 1048576 ? (m.size / 1048576).toFixed(1) + " MB" : Math.round(m.size / 1024) + " KB"}</span>
										${viewable && html`<a class="dl" href=${src + "?view=1"} target="_blank" rel="noopener">View</a>`}
										<a class="dl" href=${src + "?download=1"} download=${m.name}>Download</a>
									</div>
									${m.caption ? html`<div class="fcap">${m.caption}</div>` : null}
								</div>`;
							}
							if (m.kind === "tool") {
								const toggle = () => onToggleTool(m.id);
								return html`<div class="toolwrap">
									<button class="m-tool ${m.err ? "err" : ""}" onClick=${toggle}>${m.running && html`<span class="spin"></span>`}<span class="tn">${m.tool}</span>${m.running ? "running" : m.err ? "failed" : "done"}</button>
									${m.open && html`<div class="tool-details">
										${m.args ? html`<div class="td-h">args</div><pre>${m.args}</pre>` : null}
										${m.result ? html`<div class="td-h">${m.err ? "error" : "result"}</div><pre>${m.result}</pre>` : null}
										${!m.args && !m.result ? html`<div class="td-h">no details captured</div>` : null}
									</div>`}
								</div>`;
							}
							if (m.kind === "ask") return html`<${AskCard} m=${m} />`;
							return html`<div class="m-sys">${m.text}</div>`;
						})}
						<div class="typing ${busy ? "show" : ""}">pi is working…</div>
					</div>
					<div style="position:relative">
						<div class="cmdmenu ${cmds ? "show" : ""}">
							${(cmds ?? []).map((c) => html`<button onClick=${() => { setText("/" + c.name + " "); setCmds(null); taRef.current?.focus(); }}><b>/${c.name}</b><span>${c.description ?? ""}</span></button>`)}
						</div>
						${attached.length > 0 && html`<div class="attach-chips">
							${attached.map((a, i) => html`<span class="attach-chip ${a.kind === "image" ? "" : "nofile"}">
								${a.kind === "image" ? html`<img src=${"data:" + a.mimeType + ";base64," + a.dataBase64} alt=${a.name} />` : "📎 " + a.name}
								<button onClick=${() => setAttached((x) => x.filter((_, j) => j !== i))} aria-label="Remove">×</button></span>`)}
						</div>`}
						<div class="composer">
							<input type="file" multiple hidden ref=${fileRef} onChange=${upload} />
							<button class="clip ${uploading ? "busy" : ""}" onClick=${pickFiles} aria-label="Attach files">
								<svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="m21.4 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.2-9.19a4 4 0 0 1 5.65 5.66l-9.2 9.19a2 2 0 0 1-2.82-2.83l8.49-8.48"/></svg>
							</button>
							<textarea ref=${taRef} rows="1" placeholder="Message or /command…" value=${text}
								onInput=${(e) => { maybeCmds(e.target.value); e.target.style.height = "auto"; e.target.style.height = Math.min(e.target.scrollHeight, 120) + "px"; }}
								onKeyDown=${(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); go(); } }}></textarea>
							<button class="send" disabled=${!text.trim() && attached.length === 0} onClick=${go} aria-label="Send">↑</button>
						</div>
					</div>
				</div>
			`;
		}

		function Session({ status, plan, refresh, send, openSheet, em, pickRole, loadEm }) {
			useEffect(() => { refresh(); loadEm(); const t = setInterval(refresh, 10000); return () => clearInterval(t); }, []);
			const a = status?.agent ?? {}; const s = status?.system ?? {};
			const dot = (m) => { const d = (em?.bound ?? []).find((x) => x.ref === m); return d?.local ? (d.running ? "● " : "○ ") : ""; };
			const short = (m) => m ? m.split("/").pop() : null;
			const rename = async () => {
				const name = prompt("Session name (empty clears it):", a.sessionName || "");
				if (name === null) return;
				const r = await post("/session/rename", { name });
				if (r?.error) alert(r.error); else refresh();
			};
			const archive = async () => {
				const wasArchived = !!a.sessionArchived;
				if (!wasArchived && !confirm("Archive this session? It disappears from the Perch session lists (the live session keeps running until you exit it).")) return;
				const r = await post("/session/archive", { archived: !wasArchived });
				if (r?.error) alert(r.error); else refresh();
			};
			return html`
				<div class="pane"><div class="cards">
					<div class="card">
						<h3>Agent</h3>
						<div class="kv"><span class="k">name</span><span class="v">${a.sessionName ?? "—"}${a.sessionArchived ? " (archived)" : ""}</span></div>
						<div class="kv"><span class="k">model</span><span class="v">${a.model ?? "—"}</span></div>
						<div class="kv"><span class="k">mode</span><span class="v">${plan?.enabled ? "plan (read-only)" : plan?.executing ? "executing plan" : "normal"}</span></div>
						<div class="kv"><span class="k">state</span><span class="v">${a.idle === false ? "working" : "idle"}</span></div>
						<div class="kv"><span class="k">context</span><span class="v">${a.contextPercent != null ? `${Math.round(a.contextPercent)}%` : "—"}${a.contextTokens != null && a.contextWindow ? ` · ${Math.round(a.contextTokens / 1000)}k/${Math.round(a.contextWindow / 1000)}k` : ""}</span></div>
						<div class="kv"><span class="k">cwd</span><span class="v">${a.cwd ?? "—"}</span></div>
						<div class="kv"><span class="k">uptime</span><span class="v">${s.uptimeSeconds ? Math.round(s.uptimeSeconds / 60) + "m" : "—"}</span></div>
						<div class="kv"><span class="k">memory</span><span class="v">${s.memoryMB ? s.memoryMB + " MB" : "—"}</span></div>
						<div class="kv"><span class="k">tools</span><span class="v">${status?.tools?.count ?? "—"}</span></div>
						<div class="kv"><span class="k">classifier</span><span class="v" style="cursor:pointer;text-decoration:underline dotted" onClick=${() => openSheet("classifier")}>${a.classifier ? (a.classifier.dedicated ? `${a.classifier.dedicated.split(" @ ")[0]} → ${a.classifier.fallback}` : a.classifier.fallback) : "—"}</span></div>
					</div>
					${plan?.todosTotal > 0 && html`
						<div class="card"><h3>Plan progress — ${plan.todosDone}/${plan.todosTotal}</h3>
							${(plan.todos ?? []).map((t, i) => {
								const curIdx = (plan.todos ?? []).findIndex((x) => !x.completed);
								const cur = !t.completed && i === curIdx;
								return html`<div class="step ${t.completed ? "done" : cur ? "cur" : ""}"><span class="sbox">${t.completed ? "☑" : cur ? "▶" : "☐"}</span><span class="stxt">${t.step}. ${t.text}</span></div>`;
							})}
						</div>
					`}
					<div class="card">
						<h3>Execution models</h3>
						<div class="kv"><span class="k">executor</span><span class="v" style="cursor:pointer;text-decoration:underline dotted" onClick=${() => pickRole("executor")}>${em ? (em.executor?.model ? dot(em.executor.model) + short(em.executor.model) : "pre-plan restore") : "…"}</span></div>
						${(em?.agents ?? []).map((ag) => html`
							<div class="kv"><span class="k">${ag.name}${ag.override ? " *" : ""}</span><span class="v" style="cursor:pointer;text-decoration:underline dotted" onClick=${() => pickRole(ag.name)}>${ag.model ? dot(ag.model) + short(ag.model) : "inherit session"}</span></div>`)}
						<div class="note" style="margin:8px 2px 2px;color:var(--faint);font-size:11.5px">tap to re-bind · * = settings override · ●/○ local run state · legs apply on next spawn, executor at Execute</div>
					</div>
					<div class="card">
						<h3>Quick actions</h3>
						<div class="actions">
							<button class="abtn primary" onClick=${() => send("/critique")}>Run critics on my diff</button>
							<button class="abtn" onClick=${() => send("/critique frontier")}>Frontier critic review</button>
							<button class="abtn" onClick=${() => send("/todos")}>Show todos</button>
							<button class="abtn" onClick=${rename}>Rename session</button>
							<button class="abtn" onClick=${archive}>${a.sessionArchived ? "Unarchive session" : "Archive session"}</button>
						</div>
					</div>
				</div></div>
			`;
		}

		function Files() {
			const [dir, setDir] = useState(".");
			const [items, setItems] = useState([]);
			const [file, setFile] = useState(null);
			useEffect(() => { api("/files/list?path=" + encodeURIComponent(dir)).then((r) => setItems(r.items ?? [])); }, [dir]);
			if (file) return html`
				<div class="pane">
					<div class="crumbs"><a onClick=${() => setFile(null)}>← ${dir}</a><span>/ ${file.path.split("/").pop()}</span></div>
					<div class="fview"><pre>${file.content}</pre></div>
				</div>`;
			const crumbs = dir === "." ? [] : dir.split("/");
			return html`
				<div class="pane">
					<div class="crumbs">
						<a onClick=${() => setDir(".")}>~</a>
						${crumbs.map((c, i) => html`<span>/</span><a onClick=${() => setDir(crumbs.slice(0, i + 1).join("/"))}>${c}</a>`)}
					</div>
					<div class="flist">
						${items.map((it) => html`
							<div class="frow" onClick=${() => it.type === "directory" ? setDir(it.path) : api("/files/read?path=" + encodeURIComponent(it.path)).then((r) => r.content != null ? setFile(r) : (location.href = APP_BASE + "/api/mobile/files/download?path=" + encodeURIComponent(it.path)))}>
								${it.type === "directory" ? I.dir : I.file}
								<span class="fn">${it.name}</span>
								${it.type === "file" && html`<span class="fs">${fmtSize(it.size)}</span>`}
								${it.type === "file" && html`<a class="dl" style="color:var(--teal);font-size:12px;text-decoration:none" onClick=${(e) => e.stopPropagation()} href=${APP_BASE + "/api/mobile/files/download?path=" + encodeURIComponent(it.path)} download>↓</a>`}
							</div>`)}
					</div>
				</div>
			`;
		}

		function Activity({ acts }) {
			return html`
				<div class="pane"><div class="acts">
					${acts.length === 0 && html`<div class="m-sys" style="padding:24px">Tool activity appears here as the agent works.</div>`}
					${acts.map((a) => html`<div class="act ${a.err ? "err" : ""}"><span class="tm">${a.tm}</span><span class="src">${a.src}</span><span class="txt">${a.txt}</span></div>`)}
				</div></div>
			`;
		}

		render(html`<${App} />`, document.getElementById("app"));
		if ("serviceWorker" in navigator) navigator.serviceWorker.register(APP_BASE + "/mobile/sw.js").catch(() => {});
	</script>
</body>
</html>
